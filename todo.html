<!DOCTYPE html>
<html>
<head>
    <title>Todo List</title>
    <style>
        body {
            font-family: 'Overpass Mono', monospace;
            background-color: #F7F7F7;
            padding: 20px;
        }
        ul {
            list-style-type: none;
            padding: 30px;
        }
        li {
            margin-bottom: 15px;
            background: #FFF;
            padding: 15px;
            border-radius: 3px;
            box-shadow: 0px 1px 3px 0px rgba(0,0,0,0.1);
        }
        .todo-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .todo-description {
            font-size: 14px;
            color: #666;
        }
        h1 {
            color: #333;
            font-size: 24px;
            text-align: center;
            margin-bottom: 35px;
        }
    </style>
</head>
<body>
    <h1>My Todo List</h1>
    <ul>
        <li>
            <div class="todo-title">Build Your Own Text Editor by <a href="https://twitter.com/paigeruten">paigeruten</a></div>
            <div class="todo-description"><a href="https://viewsourcecode.org/snaptoken/kilo/">Source</a></div>
        </li>
    </ul>
</body>
</html>
